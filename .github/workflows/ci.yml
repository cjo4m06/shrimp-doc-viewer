name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      # dv-wasm is a wasm-bindgen cdylib (built in the `wasm` job); skip it natively.
      - name: Build
        run: cargo build --workspace --exclude dv-wasm
      - name: Test
        run: cargo test --workspace --exclude dv-wasm

  wasm:
    name: wasm core compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Build dv-wasm for wasm32
        run: cargo build --release --target wasm32-unknown-unknown -p dv-wasm

  lint:
    name: fmt & clippy (advisory)
    runs-on: ubuntu-latest
    # Advisory only: surfaces style/lint feedback without blocking PRs. Flip to a
    # required check once the tree is `cargo fmt`-clean and clippy-clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Components
        run: rustup component add rustfmt clippy
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --exclude dv-wasm --all-targets -- -D warnings
