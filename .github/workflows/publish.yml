name: Publish to npm

# Cuts a release when you push a version tag, e.g.:
#   npm version patch        # in packages/doc-viewer (bumps package.json + commits)
#   git tag v0.1.0 && git push origin main --tags
# Requires a repository secret NPM_TOKEN (an npm "Automation" access token):
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli (pinned to the wasm-bindgen crate)
        run: cargo install wasm-bindgen-cli --version 0.2.125 --locked
      - name: Install binaryen (wasm-opt, size pass)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build the wasm core
        run: ./scripts/build-wasm.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Sanity — tag matches package.json version (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/doc-viewer
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"; exit 1
          fi

      - name: Publish to npm
        working-directory: packages/doc-viewer
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
